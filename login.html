<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Login — Youssef Boukhmiss</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-box">
    <div class="login-mark">Youssef Boukhmiss</div>
    <span class="login-eyebrow">Studio sign in</span>

    <div class="login-field">
      <label>Email</label>
      <input type="email" id="l-email" placeholder="you@studio.com" autocomplete="username">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="l-password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <div class="login-actions">
      <button class="login-btn" id="primaryBtn" onclick="handlePrimary()">Sign in</button>
    </div>
    <div class="login-error" id="loginError"></div>

    <a class="login-back" href="index.html">← Back to the shop</a>
  </div>
</div>

<script type="module">
import { signIn, watchAuth } from "./js/auth.js";

window.handlePrimary = async function(){
  const email = document.getElementById('l-email').value.trim();
  const password = document.getElementById('l-password').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = "";
  if(!email || !password){
    errEl.textContent = "Enter an email and password.";
    return;
  }
  try{
    await signIn(email, password);
    window.location.href = "dashboard.html";
  }catch(e){
    errEl.textContent = e.message || "Something went wrong.";
  }
};

document.getElementById('l-password').addEventListener('keydown', (e) => {
  if(e.key === "Enter") window.handlePrimary();
});

// If already signed in, skip straight to the dashboard.
watchAuth(async (user) => {
  if(user){
    window.location.href = "dashboard.html";
  }
});
</script>
</body>
</html>
